<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🎷好(豪)歌‧動態譜🎷  CYBER-MUSIC INTERFACE </title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --bg-dark: #0a0a0b;
            --panel-bg: rgba(20, 20, 25, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            color: var(--neon-blue);
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            padding-left: 15px;
            margin-bottom: 30px;
            font-size: 2.2em;
            text-align: center;
        }

        .container {
            width: 98%;
            max-width: 1100px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
            padding: 10px;
            clip-path: polygon(0 0, 98% 0, 100% 2%, 100% 100%, 2% 100%, 0 98%);
        }

        .table-scroll-container {
            max-height: 600px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-blue) var(--bg-dark);
        }

        .song-table {
            width: 100%;
            border-collapse: collapse;
        }

        .song-item {
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
            border-left: 4px solid transparent; /* 為高亮光條預留空間 */
        }

        .song-item:hover {
            background: rgba(0, 243, 255, 0.05);
        }

        /* 💡 新增：當前播放曲目高亮顯示效果 */
        .song-item.active-song {
            background: rgba(0, 243, 255, 0.15) !important;
            border-left: 4px solid var(--neon-pink);
            box-shadow: inset 50px 0 50px -50px var(--neon-pink);
        }
        .song-item.active-song .song-name {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .song-name {
            padding: 15px;
            font-size: 1.2em;
            color: #fff;
            font-weight: bold;
            min-width: 180px;
            transition: 0.3s;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-width: 380px;
            margin-left: auto;
            padding: 10px 0;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: inherit;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-group button {
            width: 100%;
            box-sizing: border-box;
            min-height: 40px;
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .btn-mp3 { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-mp3:hover { background: var(--neon-pink); color: #fff; }

        .btn-video-demo { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-video-demo:hover { background: var(--neon-green); color: #000; }

        #media-display {
            margin-top: 30px;
            width: 98%;
            max-width: 1100px;
            display: none;
            background: #000;
            border: 2px solid var(--neon-pink);
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.3);
            box-sizing: border-box;
        }

        .media-header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .media-action-btn {
            font-size: 0.85em;
            padding: 6px 12px;
        }

        video { width: 100%; max-width: 900px; border: 1px solid var(--neon-blue); }
        .close-btn { margin-top: 20px; padding: 10px 30px; border-color: var(--neon-pink); color: var(--neon-pink); }
        .status-bar { margin-top: 20px; font-size: 0.8em; color: var(--neon-pink); text-transform: uppercase; text-align: center; }

        /* 💡 新增：手機版響應式卡片排版 (最佳化 UX) */
        @media (max-width: 768px) {
            h1 { font-size: 1.6em; margin-bottom: 20px; }
            .container { clip-path: none; border-radius: 8px; padding: 5px; } /* 手機版取消斜角，避免吃掉畫面邊緣空間 */
            
            .song-table thead {
                display: none; /* 手機端隱藏表頭，畫面更直覺乾淨 */
            }
            .song-table tr {
                display: block; /* 將列轉為區塊 */
                margin-bottom: 10px;
                border: 1px solid rgba(0, 243, 255, 0.2);
                border-radius: 8px;
                background: rgba(10, 10, 15, 0.5);
                border-left: 4px solid transparent;
            }
            .song-table td {
                display: block; /* 將儲存格轉為區塊，上下排列 */
                width: 100%;
                text-align: center; /* 手機版全置中 */
                box-sizing: border-box;
            }
            .song-name {
                padding: 15px 10px 5px 10px;
                font-size: 1.1em;
            }
            .btn-group {
                grid-template-columns: repeat(2, 1fr); /* 保持 2x2，但寬度撐滿 */
                max-width: 100%;
                margin: 0 auto;
                padding: 10px 15px 15px 15px;
                gap: 10px;
            }
            .btn-group button {
                padding: 12px 5px; /* 增加上下 Padding，讓手指更好點擊 */
                font-size: 0.85em;
                line-height: 1.2;
                clip-path: none; /* 手機版按鈕取消切角，確保點擊範圍最大化 */
                border-radius: 4px;
            }
            .media-header-container {
                flex-direction: column; /* 播放器標題與按鈕在手機上改為上下排 */
                gap: 10px;
            }
        }
    </style>
</head>

        const listBody = document.getElementById('song-list-body');
        const mediaDisplay = document.getElementById('media-display');
        const mediaContent = document.getElementById('media-content');
        const mediaTitle = document.getElementById('media-title');
        const mediaActions = document.getElementById('media-actions');
        const sheetAudioContainer = document.getElementById('sheet-audio-container');

        // 生成清單的邏輯 (增加 id 以便做高亮切換)
        songs.forEach((song, index) => {
            const tr = document.createElement('tr');
            tr.className = 'song-item';
            tr.id = `song-row-${index}`; // 💡 給每一列專屬 ID
            tr.innerHTML = `
                <td class="song-name">${song.name}</td>
                <td>
                    <div class="btn-group">
                        <button onclick="openMedia('sheet', ${index}, '${song.name}')">🎷簡譜.PDF</button>
                        <button class="btn-mp3" onclick="openMedia('mp3', ${index}, '${song.name}')">🎷伴奏.mp3</button>
                        <button class="btn-video-demo" onclick="openMedia('video', ${index}, '${song.name} - 演奏示範', 'demo_mp4')">🎵演奏示範</button>
                        <button onclick="openMedia('video', ${index}, '${song.name} - 純伴奏', 'backing_mp4')">🎵純伴奏</button>
                    </div>
                </td>
            `;
            listBody.appendChild(tr);
        });

        // 統一播放控制
        function openMedia(type, songIndex, title, videoKey = 'demo_mp4') {
            mediaDisplay.style.display = 'block';
            mediaTitle.innerText = `> 正在讀取: ${title}`;
            
            // 清空內容與動作按鈕
            mediaContent.innerHTML = ''; 
            mediaActions.innerHTML = '';
            sheetAudioContainer.innerHTML = '';

            // 💡 移除所有歌曲的高亮狀態，並為當前點擊的歌曲加上高亮
            document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active-song'));
            document.getElementById(`song-row-${songIndex}`).classList.add('active-song');

            const currentSong = songs[songIndex];

            // 新增全域下載按鈕功能
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'media-action-btn';
            downloadBtn.innerText = '📥 下載資源';
            downloadBtn.onclick = function() {
                window.open('https://drive.google.com/drive/u/0/folders/1HBKQdUi_PC_IObuaZ6BuM0s00lqtEv7F?hl=zh-TW', '_blank');
            };
            mediaActions.appendChild(downloadBtn);

            // 依照類型渲染核心內容
            if (type === 'sheet') {
                const playAudioBtn = document.createElement('button');
                playAudioBtn.className = 'media-action-btn btn-mp3';
                playAudioBtn.innerText = '🎵 播放伴奏';
                playAudioBtn.onclick = function() {
                    sheetAudioContainer.innerHTML = `<p style="color:#fff; margin: 5px 0;">背景伴奏音樂播放中...</p><audio controls autoplay src="${currentSong.mp3}" style="margin-bottom:15px; width: 100%; max-width: 500px;"></audio>`;
                };
                mediaActions.appendChild(playAudioBtn);

                const sheetData = currentSong.sheet;
                let imgs = Array.isArray(sheetData) ? sheetData : [sheetData];
                mediaContent.innerHTML = imgs.map(imgUrl => `<img src="${imgUrl}" style="width:100%; margin-bottom:10px; border:1px solid #00f3ff;">`).join('');

            } else if (type === 'mp3') {
                mediaContent.innerHTML = `<p style="color:#fff">音訊軌道載入中...</p><audio controls autoplay src="${currentSong.mp3}" style="width: 100%; max-width: 500px;"></audio>`;

            } else if (type === 'video') {
                const videoUrl = currentSong[videoKey];
                mediaContent.innerHTML = `<video controls autoplay src="${videoUrl}"></video>`;
            }
            
            window.scrollTo({ top: mediaDisplay.offsetTop - 20, behavior: 'smooth' });
        }

        // 關閉播放器
        function closePlayer() {
            mediaDisplay.style.display = 'none';
            mediaContent.innerHTML = '';
            mediaActions.innerHTML = '';
            sheetAudioContainer.innerHTML = '';
            
            // 關閉視窗時也可以選擇移除高亮，或者保留以提示剛剛看了哪首 (這裡選擇保留，讓使用者知道進度)
        }
