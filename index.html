<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎷好(豪)歌‧動態譜🎷</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --bg-dark: #0a0a0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0b 100%);
            color: var(--neon-blue);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "微軟正黑體", sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            text-shadow: 0 0 10px var(--neon-blue);
            margin: 20px 0;
            letter-spacing: 2px;
        }

        /* 歌曲列表容器 */
        .song-list {
            width: 100%;
            max-width: 800px;
            max-height: 50vh;
            overflow-y: auto;
            border: 1px solid var(--neon-blue);
            padding: 5px;
            background: rgba(0, 0, 0, 0.5);
            /* 讓捲動更順暢 */
            -webkit-overflow-scrolling: touch;
        }

        /* 歌曲卡片設計 (取代原本的 Table) */
        .song-card {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-left: 4px solid var(--neon-pink);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .song-info {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        /* 按鈕群組排版 */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手機上兩兩一排 */
            gap: 8px;
        }

        /* 桌面版改回四個一排 */
        @media (min-width: 600px) {
            .song-card { flex-direction: row; align-items: center; justify-content: space-between; }
            .btn-group { grid-template-columns: repeat(4, 1fr); width: auto; }
            h1 { font-size: 2.2rem; }
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 5px;
            cursor: pointer;
            font-size: 0.9rem;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: 0.2s;
        }

        button:active { background: var(--neon-blue); color: #000; }
        .btn-mp3 { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-demo { border-color: var(--neon-green); color: var(--neon-green); }

        /* 播放區域 */
        #media-display {
            display: none;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        #media-content img { width: 100%; height: auto; margin-bottom: 10px; border: 1px solid var(--neon-blue); }
        
        /* 針對 Safari 修正影片標籤 */
        video {
            width: 100%;
            background: #000;
            outline: none;
        }

        .close-btn { width: 100%; margin-top: 15px; border-color: var(--neon-pink); color: var(--neon-pink); }
    </style>
</head>
<body>

    <h1>🎷好(豪)歌‧動態譜🎷</h1>

    <div class="song-list" id="song-list">
        <!-- 歌曲會由 JS 生成 -->
    </div>

    <div id="media-display">
        <div id="media-title" style="color:var(--neon-blue); margin-bottom:10px; font-weight:bold;"></div>
        <div id="media-content"></div>
        <button class="close-btn" onclick="closePlayer()">關閉視窗</button>
    </div>

    <script>
        const songs = [
            {
                name: "另一種鄉愁",
                sheet: ["sheets/另一種鄉愁.png", "sheets/另一種鄉愁1.png"],
                mp3: "music/另一種鄉愁.mp3",
                demo_mp4: "video/另一種鄉愁.mp4",
                backing_mp4: "video/另一種鄉愁1.mp4"
            },
            {
                name: "若是有一天",
                sheet: ["sheets/若是有一天.png", "sheets/若是有一天1.png"],
                mp3: "music/若是有一天.mp3",
                demo_mp4: "video/若是有一天.mp4",
                backing_mp4: "video/若是有一天1.mp4"
            }
        ];

        const listContainer = document.getElementById('song-list');
        const mediaDisplay = document.getElementById('media-display');
        const mediaContent = document.getElementById('media-content');
        const mediaTitle = document.getElementById('media-title');

        // 生成卡片列表
        songs.forEach((song, index) => {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `
                <div class="song-info">${song.name}</div>
                <div class="btn-group">
                    <button onclick="openMedia('sheet', ${index}, '${song.name}')">簡譜</button>
                    <button class="btn-mp3" onclick="openMedia('mp3', '${song.mp3}', '${song.name}')">伴奏</button>
                    <button class="btn-demo" onclick="openMedia('video', '${song.demo_mp4}', '${song.name}-示範')">示範</button>
                    <button onclick="openMedia('video', '${song.backing_mp4}', '${song.name}-動態')">動態</button>
                </div>
            `;
            listContainer.appendChild(card);
        });

        function openMedia(type, urlOrIndex, title) {
            mediaDisplay.style.display = 'block';
            mediaTitle.innerText = `▶ ${title}`;
            mediaContent.innerHTML = ''; 
            
            if (type === 'sheet') {
                const sheetData = songs[urlOrIndex].sheet;
                let imgs = Array.isArray(sheetData) ? sheetData : [sheetData];
                mediaContent.innerHTML = imgs.map(imgUrl => `<img src="${imgUrl}">`).join('');
            } else if (type === 'mp3') {
                mediaContent.innerHTML = `<audio controls autoplay src="${urlOrIndex}"></audio>`;
            } else if (type === 'video') {
                /**
                 * Safari 關鍵修正：
                 * 1. 使用 playsinline & webkit-playsinline 防止跳出全螢幕
                 * 2. 加入 preload="metadata" 幫助 Safari 預先獲取影片長度
                 * 3. 去掉 autoplay，因為 Safari 常攔截非靜音的自動播放
                 */
                const videoEl = document.createElement('video');
                videoEl.controls = true;
                videoEl.playsInline = true;
                videoEl.setAttribute('webkit-playsinline', 'true');
                videoEl.setAttribute('preload', 'metadata');
                videoEl.src = urlOrIndex;
                
                mediaContent.appendChild(videoEl);
                videoEl.play().catch(e => console.log("自動播放被攔截，請手動點擊播放"));
            }
            
            window.scrollTo({ top: mediaDisplay.offsetTop - 20, behavior: 'smooth' });
        }

        function closePlayer() {
            mediaDisplay.style.display = 'none';
            mediaContent.innerHTML = '';
        }
    </script>
</body>
</html>
